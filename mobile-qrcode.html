<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYU统计助手 - 手机访问</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .url-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            color: #666;
            border: 2px dashed #ddd;
        }
        .qr-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .qr-placeholder {
            background: #f8f9fa;
            border: 3px dashed #dee2e6;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .qr-placeholder img {
            max-width: 100%;
            height: auto;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: #6c757d;
        }
        .steps {
            margin-top: 30px;
        }
        .steps h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .step {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .step-number {
            font-weight: bold;
            color: #856404;
            margin-right: 10px;
        }
        .copy-hint {
            text-align: center;
            color: #28a745;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        .copy-hint.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 AYU统计助手</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">手机访问二维码</p>
        
        <div class="url-box" id="urlBox" onclick="copyUrl()">
            <strong>访问地址：</strong><br>
            https://4fa978b4-5da1-4517-ad1c-4b724b27c934.dev.coze.site
            <div class="copy-hint" id="copyHint">✓ 已复制到剪贴板</div>
        </div>

        <div class="qr-section">
            <div class="qr-placeholder">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://4fa978b4-5da1-4517-ad1c-4b724b27c934.dev.coze.site" alt="手机访问二维码">
            </div>
            <p style="color: #666; font-size: 14px;">
                用手机扫码或点击下方按钮访问
            </p>
        </div>

        <a href="https://4fa978b4-5da1-4517-ad1c-4b724b27c934.dev.coze.site" target="_blank" class="btn">
            🚀 立即访问 AYU统计助手
        </a>

        <div class="steps">
            <h3>📋 访问步骤</h3>
            <div class="step">
                <span class="step-number">1</span>
                <span>用手机浏览器（如微信、Safari、Chrome）扫描上方二维码</span>
            </div>
            <div class="step">
                <span class="step-number">2</span>
                <span>或点击"立即访问"按钮</span>
            </div>
            <div class="step">
                <span class="step-number">3</span>
                <span>开始使用 AYU统计助手</span>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center; color: #999; font-size: 12px;">
            <p>✅ 服务运行中 | 🔒 HTTPS 加密</p>
            <p>📱 支持 iOS 和 Android</p>
        </div>
    </div>

    <script>
        function copyUrl() {
            const url = 'https://4fa978b4-5da1-4517-ad1c-4b724b27c934.dev.coze.site';
            navigator.clipboard.writeText(url).then(() => {
                const hint = document.getElementById('copyHint');
                hint.classList.add('show');
                setTimeout(() => {
                    hint.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }
    </script>
</body>
</html>
